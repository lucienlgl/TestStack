AWSTemplateFormatVersion: '2010-09-09'
Resources:
  # Service Catalog Product（从 Git 同步）
  SCProductFromGit:
    Type: AWS::ServiceCatalog::CloudFormationProduct
    Properties:
      Name: "My-Git-Synced-Product"
      Description: "从 Git 同步的 CloudFormation 产品"
      ProductType: CLOUD_FORMATION_TEMPLATE
      Owner: "Your-Team"

      # Git 同步配置（缺一不可）
      ConnectionArn: "arn:aws:codestar-connections:ap-southeast-1:123456789012:connection/abc123-xxx"
      Repository: "your-org/your-repo"
      Branch: "main"
      ArtifactPath: "test.yaml"

      # 版本信息
      ProvisioningArtifactParameters:
        - Name: "v1"
          Description: "Initial version from Git"

  # 可选：Portfolio + 关联产品
  SCPortfolio:
    Type: AWS::ServiceCatalog::Portfolio
    Properties:
      DisplayName: "My-Git-Portfolio"
      Description: "存放 Git 同步产品的 Portfolio"
      ProviderName: "Your-Team"

  AssociateProductWithPortfolio:
    Type: AWS::ServiceCatalog::PortfolioProductAssociation
    Properties:
      PortfolioId: !Ref SCPortfolio
      ProductId: !Ref SCProductFromGit
